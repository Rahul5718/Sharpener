<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Expense tracker</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
     
</head>
<body>
     <div class="container mt-5">

          <form id="expense-form">
               <h1 class="text-center">Expense Tracker</h1>
               <div class="mb-3">
                    <label for="amount" class="form-label">Choose ExpenceAmount</label>
                    <input type="number" class="form-control" id="amount" placeholder="Enter amount">
               </div>
               <div class="mb-3">
                    <label for="description" class="form-label">Choose Description</label>
                    <input type="text" class="form-control" id="description" placeholder="Enter description">
               </div>
               <div class="mb-3">
                    <label for="category" class="form-label">Choose Category</label>
                    <select class="form-select" id="category">
                         <option value="">Select category</option>
                         <option value="Food">Food</option>
                         <option value="Transport">Transport</option>
                         <option value="Entertainment">Entertainment</option>
                         <option va;ue="Petrol">Petrol</option>
                         <option value="Other">Other</option>
                    </select>
               <br>
               <button type="submit" class="btn btn-primary">Add Expense</button>
          </form>
          <hr>
          <h2 class="text-center">Expense List</h2>
          <ul id="expense-list" class="list-group">
               <!-- Expense items will be added here -->
          </ul>
          

     </div>
</body>
<script src="script.js"></script>
</html>
