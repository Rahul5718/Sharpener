<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- The Fix -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; connect-src 'self' http://localhost:3000 ws://localhost:3000;">
    <title>Slot Scheduler</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .slot-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .slot-card:hover { background-color: #f0f0f0; }
        .disabled { background-color: #ffebee; cursor: not-allowed; pointer-events: none; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-radius: 8px; z-index: 10; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 5; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        .booking-list { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Available Slots</h2>
    <div id="slots-container"></div>

    <div class="booking-list">
        <h3>Current Bookings Dashboard</h3>
        <ul id="bookings-dashboard"></ul>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="modal" id="bookingModal">
    <h3 id="modalTitle">Book Slot</h3>
    <form id="bookingForm">
        <input type="hidden" id="selectedTime">
        <input type="text" id="userName" placeholder="Your Name" required>
        <input type="email" id="userEmail" placeholder="Your Email" required>
        <button type="submit">Confirm Appointment</button>
        <button type="button" style="background-color:#dc3545;" onclick="closeModal()">Cancel</button>
    </form>
</div>

<script src="../public/main.js"></script>
</body>
</html>
